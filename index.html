<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Solver</title><style>
body{
font-family:Segoe UI;
background:#eaf4ff;
text-align:center;
}

h1{
color:#1e6fd9;
}

.container{
background:white;
padding:20px;
width:95%;
max-width:900px;
margin:auto;
border-radius:14px;
box-shadow:0px 5px 18px rgba(0,0,0,.12);
}

input{
width:55px;
height:38px;
margin:2px;
text-align:center;
border-radius:6px;
border:1px solid #9cc8ff;
}

button{
padding:10px;
margin:4px;
border:none;
border-radius:8px;
background:#4da3ff;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1e6fd9;
}

.section{
margin-top:10px;
}

#result{
margin-top:20px;
font-size:18px;
color:#003366;
}

.matrixBlock{
margin-top:15px;
}
</style></head><body><h1>Matrix Solver</h1><div class="container">Matrix Size: <input id="size" type="number" value="3" min="2" max="6"> <button onclick="createMatrices()">Create Matrices</button>

<div class="matrixBlock">
<h3>Matrix A</h3>
<div id="matrixA"></div><h3>Matrix B</h3>
<div id="matrixB"></div>
</div><div class="section">
<button onclick="addMatrix()">A + B</button>
<button onclick="subtractMatrix()">A − B</button>
<button onclick="multiplyMatrix()">A × B</button>
</div><div class="section">
<button onclick="determinant()">Determinant(A)</button>
<button onclick="inverse()">Inverse(A)</button>
<button onclick="transpose()">Transpose(A)</button>
<button onclick="traceMatrix()">Trace(A)</button>
<button onclick="rankMatrix()">Rank(A)</button>
</div><div class="section">
<button onclick="identityCheck()">Identity?</button>
<button onclick="symmetricCheck()">Symmetric?</button>
<button onclick="orthogonalCheck()">Orthogonal?</button>
<button onclick="upperTriangularCheck()">Upper Triangular?</button>
<button onclick="lowerTriangularCheck()">Lower Triangular?</button>
</div><div class="section">
<button onclick="gaussianElimination()">Gaussian Elimination</button>
<button onclick="rowEchelon()">REF</button>
<button onclick="rref()">RREF</button>
</div><div id="result"></div></div><script>

function createMatrices(){
let n=size.value
let html=""
for(let i=0;i<n;i++){
for(let j=0;j<n;j++) html+=`<input id=a${i}${j} value=0>`
html+="<br>"
}
matrixA.innerHTML=html

html=""
for(let i=0;i<n;i++){
for(let j=0;j<n;j++) html+=`<input id=b${i}${j} value=0>`
html+="<br>"
}
matrixB.innerHTML=html
}

function getMatrix(id){
let n=size.value
let M=[]
for(let i=0;i<n;i++){
M[i]=[]
for(let j=0;j<n;j++){
M[i][j]=parseFloat(document.getElementById(`${id}${i}${j}`).value)
}
}
return M
}

function showMatrix(M){
let html="<br>"
for(let row of M) html+=row.map(x=>x.toFixed(3)).join("  ")+"<br>"
result.innerHTML=html
}

function addMatrix(){
let A=getMatrix("a")
let B=getMatrix("b")
let C=A.map((r,i)=>r.map((v,j)=>v+B[i][j]))
showMatrix(C)
}

function subtractMatrix(){
let A=getMatrix("a")
let B=getMatrix("b")
let C=A.map((r,i)=>r.map((v,j)=>v-B[i][j]))
showMatrix(C)
}

function multiplyMatrix(){
let A=getMatrix("a")
let B=getMatrix("b")
let n=A.length
let C=[]
for(let i=0;i<n;i++){
C[i]=[]
for(let j=0;j<n;j++){
C[i][j]=0
for(let k=0;k<n;k++) C[i][j]+=A[i][k]*B[k][j]
}
}
showMatrix(C)
}

function determinant(){
let A=getMatrix("a")
let n=A.length
let det=1
for(let i=0;i<n;i++){
if(A[i][i]==0){result.innerHTML="Determinant = 0";return}
for(let j=i+1;j<n;j++){
let f=A[j][i]/A[i][i]
for(let k=i;k<n;k++) A[j][k]-=f*A[i][k]
}
det*=A[i][i]
}
result.innerHTML="Determinant = "+det.toFixed(3)
}

function transpose(){
let A=getMatrix("a")
showMatrix(A[0].map((_,i)=>A.map(r=>r[i])))
}

function traceMatrix(){
let A=getMatrix("a")
let t=0
for(let i=0;i<A.length;i++) t+=A[i][i]
result.innerHTML="Trace = "+t
}

function identityCheck(){
let A=getMatrix("a")
for(let i=0;i<A.length;i++){
for(let j=0;j<A.length;j++){
if((i==j&&A[i][j]!=1)||(i!=j&&A[i][j]!=0)){
result.innerHTML="Not Identity Matrix";return
}
}
}
result.innerHTML="Identity Matrix"
}

function symmetricCheck(){
let A=getMatrix("a")
for(let i=0;i<A.length;i++){
for(let j=0;j<A.length;j++){
if(A[i][j]!=A[j][i]){result.innerHTML="Not Symmetric";return}
}
}
result.innerHTML="Symmetric Matrix"
}

function orthogonalCheck(){
let A=getMatrix("a")
let AT=A[0].map((_,i)=>A.map(r=>r[i]))
let n=A.length
let P=[]
for(let i=0;i<n;i++){
P[i]=[]
for(let j=0;j<n;j++){
P[i][j]=0
for(let k=0;k<n;k++) P[i][j]+=A[i][k]*AT[k][j]
}
}
for(let i=0;i<n;i++){
for(let j=0;j<n;j++){
if((i==j&&Math.abs(P[i][j]-1)>0.01)||(i!=j&&Math.abs(P[i][j])>0.01)){
result.innerHTML="Not Orthogonal";return
}
}
}
result.innerHTML="Orthogonal Matrix"
}

function upperTriangularCheck(){
let A=getMatrix("a")
for(let i=1;i<A.length;i++){
for(let j=0;j<i;j++){
if(A[i][j]!=0){result.innerHTML="Not Upper Triangular";return}
}
}
result.innerHTML="Upper Triangular Matrix"
}

function lowerTriangularCheck(){
let A=getMatrix("a")
for(let i=0;i<A.length;i++){
for(let j=i+1;j<A.length;j++){
if(A[i][j]!=0){result.innerHTML="Not Lower Triangular";return}
}
}
result.innerHTML="Lower Triangular Matrix"
}

function gaussianElimination(){
let A=getMatrix("a")
let n=A.length
for(let i=0;i<n;i++){
for(let j=i+1;j<n;j++){
let r=A[j][i]/A[i][i]
for(let k=0;k<n;k++) A[j][k]-=r*A[i][k]
}
}
showMatrix(A)
}

function rowEchelon(){ gaussianElimination() }

function rref(){
let A=getMatrix("a")
let lead=0
for(let r=0;r<A.length;r++){
if(lead>=A.length) return
let i=r
while(A[i][lead]==0){
i++
if(i==A.length){i=r;lead++;if(lead==A.length)return}
}
[A[i],A[r]]=[A[r],A[i]]
let val=A[r][lead]
for(let j=0;j<A.length;j++) A[r][j]/=val
for(let i=0;i<A.length;i++){
if(i!=r){
let val=A[i][lead]
for(let j=0;j<A.length;j++) A[i][j]-=val*A[r][j]
}
}
lead++
}
showMatrix(A)
}

function inverse(){
let A=getMatrix("a")
let n=A.length
let I=[]
for(let i=0;i<n;i++){
I[i]=[]
for(let j=0;j<n;j++) I[i][j]=(i==j)?1:0
}

for(let i=0;i<n;i++){
let diag=A[i][i]
if(diag==0){result.innerHTML="Inverse not possible";return}
for(let j=0;j<n;j++){A[i][j]/=diag;I[i][j]/=diag}

for(let k=0;k<n;k++){
if(k!=i){
let f=A[k][i]
for(let j=0;j<n;j++){
A[k][j]-=f*A[i][j]
I[k][j]-=f*I[i][j]
}
}
}
}
showMatrix(I)
}

createMatrices()

</script></body>
</html>
